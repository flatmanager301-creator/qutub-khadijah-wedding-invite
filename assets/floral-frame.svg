<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1400" fill="none">
  <defs>
    <radialGradient id="rose" cx="34%" cy="28%" r="76%"><stop stop-color="#fffaf7"/><stop offset=".35" stop-color="#f5d8d1"/><stop offset=".72" stop-color="#dba8a4"/><stop offset="1" stop-color="#b77478"/></radialGradient>
    <radialGradient id="cream" cx="35%" cy="28%" r="78%"><stop stop-color="#fffef9"/><stop offset=".45" stop-color="#f8eadc"/><stop offset="1" stop-color="#d9b98f"/></radialGradient>
    <radialGradient id="mauve" cx="35%" cy="28%" r="76%"><stop stop-color="#fff8f7"/><stop offset=".38" stop-color="#ecd2d4"/><stop offset="1" stop-color="#a96770"/></radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#becab3"/><stop offset=".48" stop-color="#84957d"/><stop offset="1" stop-color="#526450"/></linearGradient>
    <linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d0d8c8"/><stop offset="1" stop-color="#71836d"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#765452" flood-opacity=".16"/></filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.8"/></filter>

    <g id="roseFlower">
      <g fill="url(#rose)">
        <ellipse rx="60" ry="32" transform="rotate(0) translate(0 -34)"/><ellipse rx="60" ry="32" transform="rotate(45) translate(0 -34)"/><ellipse rx="60" ry="32" transform="rotate(90) translate(0 -34)"/><ellipse rx="60" ry="32" transform="rotate(135) translate(0 -34)"/>
        <ellipse rx="44" ry="27" transform="rotate(22.5) translate(0 -20)"/><ellipse rx="44" ry="27" transform="rotate(67.5) translate(0 -20)"/><ellipse rx="44" ry="27" transform="rotate(112.5) translate(0 -20)"/><ellipse rx="44" ry="27" transform="rotate(157.5) translate(0 -20)"/>
      </g>
      <circle r="28" fill="url(#cream)"/><path d="M-16 1C-6-18 17-20 25-3C31 12 18 27 1 27C-17 26-25 13-16 1Z" fill="#fff9f3" opacity=".7"/>
    </g>

    <g id="peony">
      <g fill="url(#mauve)">
        <ellipse rx="67" ry="35" transform="rotate(0) translate(0 -28)"/><ellipse rx="67" ry="35" transform="rotate(36) translate(0 -28)"/><ellipse rx="67" ry="35" transform="rotate(72) translate(0 -28)"/><ellipse rx="67" ry="35" transform="rotate(108) translate(0 -28)"/><ellipse rx="67" ry="35" transform="rotate(144) translate(0 -28)"/>
      </g>
      <g fill="#f7dedc" opacity=".8"><ellipse rx="44" ry="25" transform="rotate(18) translate(0 -16)"/><ellipse rx="44" ry="25" transform="rotate(78) translate(0 -16)"/><ellipse rx="44" ry="25" transform="rotate(138) translate(0 -16)"/></g>
      <circle r="23" fill="#fff1df"/><circle r="10" fill="#d5a867"/>
    </g>

    <g id="creamFlower">
      <g fill="url(#cream)"><ellipse rx="54" ry="29" transform="rotate(0) translate(0 -25)"/><ellipse rx="54" ry="29" transform="rotate(45) translate(0 -25)"/><ellipse rx="54" ry="29" transform="rotate(90) translate(0 -25)"/><ellipse rx="54" ry="29" transform="rotate(135) translate(0 -25)"/></g>
      <circle r="23" fill="#fffdfa"/><circle r="8" fill="#d4ad6d"/>
    </g>

    <g id="smallBloom"><circle r="18" fill="#fffaf3"/><circle cx="17" cy="-7" r="16" fill="#f4d6d1"/><circle cx="18" cy="13" r="15" fill="#fff5ec"/><circle cx="0" cy="23" r="15" fill="#ead0c7"/><circle cx="-16" cy="10" r="15" fill="#fffaf3"/><circle cx="4" cy="7" r="7" fill="#c99d5d"/></g>

    <g id="leafBranch">
      <path d="M0 225C28 170 57 111 112 0" stroke="#75846e" stroke-width="7" stroke-linecap="round"/>
      <g fill="url(#leaf)">
        <path d="M18 185C-17 174-38 148-34 113C2 118 23 143 18 185Z"/><path d="M39 157C75 126 106 122 135 143C109 174 77 181 39 157Z"/>
        <path d="M54 122C20 108 4 80 13 48C47 59 65 83 54 122Z"/><path d="M75 88C106 62 135 60 160 78C138 105 109 111 75 88Z"/>
        <path d="M93 45C68 34 57 14 62-8C88 0 101 17 93 45Z"/>
      </g>
    </g>

    <g id="eucalyptus">
      <path d="M0 220C38 164 66 103 93 0" stroke="#87957f" stroke-width="5" stroke-linecap="round"/>
      <g fill="url(#leaf2)" opacity=".9">
        <ellipse cx="17" cy="176" rx="21" ry="35" transform="rotate(-35 17 176)"/><ellipse cx="51" cy="151" rx="20" ry="34" transform="rotate(38 51 151)"/>
        <ellipse cx="45" cy="111" rx="20" ry="34" transform="rotate(-35 45 111)"/><ellipse cx="76" cy="82" rx="19" ry="32" transform="rotate(35 76 82)"/>
        <ellipse cx="73" cy="42" rx="17" ry="29" transform="rotate(-32 73 42)"/>
      </g>
    </g>
  </defs>

  <!-- top left -->
  <g transform="translate(58 58)">
