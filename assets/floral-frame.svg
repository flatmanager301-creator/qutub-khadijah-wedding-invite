  <!-- delicate side trails -->
  <g opacity=".76"><use href="#eucalyptus" transform="translate(15 820) rotate(-5) scale(.9)"/><use href="#eucalyptus" transform="translate(1585 820) scale(-.9 .9) rotate(-5)"/></g>
</svg>
