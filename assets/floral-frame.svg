    <use href="#eucalyptus" transform="translate(205 135) rotate(-25) scale(1.15)"/>
    <use href="#leafBranch" transform="translate(260 105) rotate(8) scale(.92)"/>
    <use href="#roseFlower" transform="translate(160 245) scale(1.15)"/>
    <use href="#peony" transform="translate(305 170) scale(.92)"/>
    <use href="#creamFlower" transform="translate(65 345) scale(.74)"/>
    <use href="#roseFlower" transform="translate(360 335) scale(.7)"/>
    <use href="#smallBloom" transform="translate(275 310) scale(.9)"/>
    <use href="#smallBloom" transform="translate(420 205) scale(.7)"/>
    <g fill="#c9878d" opacity=".65"><circle cx="92" cy="170" r="9"/><circle cx="126" cy="133" r="7"/><circle cx="380" cy="95" r="8"/><circle cx="441" cy="270" r="7"/></g>
  </g>

  <!-- top right mirrored -->
  <g transform="translate(1542 58) scale(-1 1)">
    <use href="#leafBranch" transform="translate(40 220) rotate(-48) scale(1.16)"/>
    <use href="#eucalyptus" transform="translate(205 135) rotate(-25) scale(1.15)"/>
    <use href="#leafBranch" transform="translate(260 105) rotate(8) scale(.92)"/>
    <use href="#roseFlower" transform="translate(160 245) scale(1.15)"/>
    <use href="#peony" transform="translate(305 170) scale(.92)"/>
    <use href="#creamFlower" transform="translate(65 345) scale(.74)"/>
    <use href="#roseFlower" transform="translate(360 335) scale(.7)"/>
    <use href="#smallBloom" transform="translate(275 310) scale(.9)"/>
    <use href="#smallBloom" transform="translate(420 205) scale(.7)"/>
    <g fill="#c9878d" opacity=".65"><circle cx="92" cy="170" r="9"/><circle cx="126" cy="133" r="7"/><circle cx="380" cy="95" r="8"/><circle cx="441" cy="270" r="7"/></g>
  </g>

  <!-- bottom left -->
  <g transform="translate(70 1342) scale(1 -1)">
    <use href="#leafBranch" transform="translate(30 235) rotate(-48) scale(1.28)"/>
    <use href="#eucalyptus" transform="translate(230 135) rotate(-22) scale(1.3)"/>
    <use href="#roseFlower" transform="translate(150 245) scale(1.2)"/>
    <use href="#peony" transform="translate(330 180) scale(1.05)"/>
    <use href="#creamFlower" transform="translate(65 370) scale(.82)"/>
    <use href="#roseFlower" transform="translate(415 330) scale(.78)"/>
    <use href="#smallBloom" transform="translate(286 320)"/>
  </g>

  <!-- bottom right mirrored -->
  <g transform="translate(1530 1342) scale(-1 -1)">
    <use href="#leafBranch" transform="translate(30 235) rotate(-48) scale(1.28)"/>
    <use href="#eucalyptus" transform="translate(230 135) rotate(-22) scale(1.3)"/>
    <use href="#roseFlower" transform="translate(150 245) scale(1.2)"/>
    <use href="#peony" transform="translate(330 180) scale(1.05)"/>
    <use href="#creamFlower" transform="translate(65 370) scale(.82)"/>
    <use href="#roseFlower" transform="translate(415 330) scale(.78)"/>
    <use href="#smallBloom" transform="translate(286 320)"/>
