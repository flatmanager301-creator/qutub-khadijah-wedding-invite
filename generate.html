<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5e6e3" />
  <title>Invitation Link Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;padding:1rem;color:#55403f;background:linear-gradient(rgba(255,250,246,.82),rgba(245,230,227,.88)),url('assets/floral-frame.svg') center/cover no-repeat;font-family:Manrope,system-ui,sans-serif}.card{width:min(100%,580px);padding:clamp(1.4rem,6vw,3rem);border:1px solid rgba(167,126,103,.28);border-radius:36px;background:rgba(255,253,249,.88);box-shadow:0 28px 80px rgba(87,55,55,.15);backdrop-filter:blur(8px);text-align:center}.logo{width:90px;aspect-ratio:1;margin:auto;padding:5px;border:1px solid rgba(181,143,104,.45);border-radius:50%;object-fit:cover}h1{margin:.8rem 0 .25rem;font:500 clamp(2.3rem,9vw,4rem)/.95 'Cormorant Garamond',serif}p{color:#846b69;font-size:.9rem;line-height:1.6}label{display:block;margin-top:1.5rem;text-align:left;font-size:.75rem;font-weight:600}input{width:100%;height:54px;margin-top:.45rem;padding:0 .9rem;border:1px solid rgba(142,69,82,.22);border-radius:16px;background:white;outline:none}button{width:100%;min-height:56px;margin-top:.8rem;border:0;border-radius:99px;color:white;background:linear-gradient(135deg,#a75d69,#6e2e3b);font-weight:600;cursor:pointer}.output{display:none;margin-top:1.1rem;padding:1rem;border:1px solid rgba(142,69,82,.18);border-radius:16px;background:rgba(255,255,255,.64);text-align:left;overflow-wrap:anywhere}.output.show{display:block}.output a{color:#6e2e3b;font-size:.78rem}small{display:block;margin-top:.55rem;color:#846b69}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/logo.jpeg" alt="Invitation logo" />
    <h1>Personalised Invitation</h1>
    <p>Enter a guest name to create a clean personalised link.</p>
    <label for="guest">Guest name</label>
    <input id="guest" type="text" placeholder="Example: Murtaza & Family" autocomplete="off" />
    <button id="generate" type="button">Generate Link</button>
    <div class="output" id="output">
      <a id="link" href="#" target="_blank" rel="noopener"></a>
      <button id="copy" type="button">Copy Link</button>
      <small id="status"></small>
    </div>
  </main>
  <script>
    const guest=document.getElementById('guest'),output=document.getElementById('output'),link=document.getElementById('link'),status=document.getElementById('status');
    const create=()=>{const name=guest.value.trim();if(!name){guest.focus();return;}const base=new URL('index.html',location.href);base.searchParams.set('g',name);link.href=base.href;link.textContent=base.href;output.classList.add('show');status.textContent='';};
    document.getElementById('generate').addEventListener('click',create);guest.addEventListener('keydown',e=>{if(e.key==='Enter')create()});
    document.getElementById('copy').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(link.href);status.textContent='Copied.'}catch{status.textContent='Press and hold the link to copy it.'}});
  </script>
</body>
</html>
