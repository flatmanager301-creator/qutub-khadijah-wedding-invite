<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f7efe8" />
  <title>Personalized Invitation Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--ivory:#fffaf4;--rose:#98585f;--ink:#604342;--line:rgba(180,137,108,.28);--serif:"Cormorant Garamond",serif;--sans:"DM Sans",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;padding:1.25rem;background:radial-gradient(circle at 20% 10%,rgba(221,179,173,.25),transparent 28rem),linear-gradient(145deg,#fffaf4,#f3e6dc);font-family:var(--sans);color:var(--ink)}
    main{width:min(100%,560px);padding:clamp(1.4rem,5vw,2.6rem);border:1px solid var(--line);border-radius:30px;background:rgba(255,255,255,.68);box-shadow:0 24px 70px rgba(104,72,65,.14);backdrop-filter:blur(18px)}
    h1{font-family:var(--serif);font-size:clamp(2.4rem,9vw,4rem);font-weight:500;line-height:.95;margin:0 0 .8rem}p{color:#876d69;line-height:1.65}label{display:block;font-weight:600;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;margin:1.5rem 0 .5rem}input{width:100%;min-height:56px;border:1px solid var(--line);border-radius:16px;padding:0 1rem;background:rgba(255,255,255,.75);font:inherit;color:var(--ink);outline:none}input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(152,88,95,.10)}button,a{min-height:54px;border-radius:99px;padding:.8rem 1.2rem;font:600 .84rem var(--sans);letter-spacing:.04em;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}button{width:100%;margin-top:1rem;border:0;background:linear-gradient(135deg,#b97978,#98585f);color:white}.result{display:none;margin-top:1.4rem;padding-top:1.4rem;border-top:1px solid var(--line)}.result.show{display:block}.url{padding:.9rem;border-radius:14px;background:#fff;word-break:break-all;font-size:.78rem}.actions{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:.8rem}.actions button,.actions a{margin:0;border:1px solid var(--line);background:white;color:var(--rose)}small{display:block;margin-top:1rem;color:#9b827c}
  </style>
</head>
<body>
  <main>
    <h1>Create a guest link</h1>
    <p>Enter the guest’s name to generate a personalized invitation URL. The main website will display “Dear [Guest Name]”.</p>
    <label for="guest">Guest name</label>
    <input id="guest" type="text" placeholder="e.g. Hatim & Family" autocomplete="off" />
    <button id="generate" type="button">Generate personalized link</button>
    <div class="result" id="result">
      <div class="url" id="url"></div>
      <div class="actions">
        <button id="copy" type="button">Copy Link</button>
        <a id="preview" href="#" target="_blank" rel="noopener">Preview</a>
      </div>
      <small>The short parameter format is <strong>?g=Guest-Name</strong>.</small>
    </div>
  </main>
  <script>
    const guest=document.getElementById('guest'),result=document.getElementById('result'),urlEl=document.getElementById('url'),preview=document.getElementById('preview');let generated='';
    document.getElementById('generate').onclick=()=>{const name=guest.value.trim().replace(/\s+/g,' ');if(!name){guest.focus();return}const slug=name.replace(/\s/g,'-');generated=new URL('index.html',location.href);generated.searchParams.set('g',slug);urlEl.textContent=generated.href;preview.href=generated.href;result.classList.add('show')};
    document.getElementById('copy').onclick=async()=>{if(!generated)return;await navigator.clipboard.writeText(generated.href);document.getElementById('copy').textContent='Copied';setTimeout(()=>document.getElementById('copy').textContent='Copy Link',1400)};
  </script>
</body>
</html>
